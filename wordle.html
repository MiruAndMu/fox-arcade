<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fox Wordle</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #1a1a2e;
    color: #eee;
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
}
.nav { padding: 10px; width: 100%; }
.nav a { color: #f4845f; text-decoration: none; font-size: 14px; }
h1 { color: #f4845f; font-size: 28px; margin: 5px 0 10px; }
.message {
    height: 24px;
    font-size: 16px;
    color: #e94560;
    margin: 5px 0;
    text-align: center;
}

/* Grid */
.grid {
    display: grid;
    grid-template-rows: repeat(6, 1fr);
    gap: 6px;
    margin: 5px 0;
}
.row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
}
.cell {
    width: 52px;
    height: 52px;
    border: 2px solid #0f3460;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: bold;
    text-transform: uppercase;
    background: #16213e;
    transition: all 0.3s;
}
.cell.filled { border-color: #555; }
.cell.correct { background: #538d4e; border-color: #538d4e; color: #fff; }
.cell.present { background: #b59f3b; border-color: #b59f3b; color: #fff; }
.cell.absent { background: #3a3a4c; border-color: #3a3a4c; color: #888; }

/* Keyboard */
.keyboard { margin: 10px 0; display: flex; flex-direction: column; gap: 6px; align-items: center; }
.kb-row { display: flex; gap: 4px; }
.key {
    padding: 12px 10px;
    min-width: 30px;
    height: 44px;
    border: none;
    border-radius: 4px;
    background: #0f3460;
    color: #eee;
    font-size: 14px;
    font-weight: bold;
    font-family: 'Courier New', monospace;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    text-transform: uppercase;
    transition: all 0.2s;
}
.key:active { transform: scale(0.95); }
.key.wide { min-width: 56px; font-size: 12px; }
.key.correct { background: #538d4e; }
.key.present { background: #b59f3b; }
.key.absent { background: #222; color: #555; }

.stats {
    margin: 10px 0;
    font-size: 12px;
    color: #7f8c8d;
    text-align: center;
}
</style>
</head>
<body>

<div class="nav"><a href="index.html" aria-label="Back to Fox Arcade">Back to Arcade</a></div>
<h1>Fox Wordle</h1>
<div class="message" id="message" aria-live="polite"></div>

<div class="grid" id="grid"></div>

<div class="keyboard" id="keyboard"></div>

<div class="stats" id="stats"></div>

<script>
// --- Word list (common 5-letter words) ---

// --- Game state ---
let answer = '';
let currentRow = 0;
let currentCol = 0;
let gameOver = false;
let guesses = [];

// Pick daily word (seeded by date)
function getDailyWord() {
    const d = new Date();
    const seed = d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
    return WORDS[seed % WORDS.length].toUpperCase();
}

// --- Build grid ---
function buildGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    for (let r = 0; r < 6; r++) {
        const row = document.createElement('div');
        row.className = 'row';
        row.setAttribute('aria-label', `Row ${r + 1}`);
        for (let c = 0; c < 5; c++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.id = `cell-${r}-${c}`;
            cell.setAttribute('aria-label', `Row ${r + 1} Column ${c + 1} Empty`);
            row.appendChild(cell);
        }
        grid.appendChild(row);
    }
}

// --- Build keyboard ---
function buildKeyboard() {
    const kb = document.getElementById('keyboard');
    kb.innerHTML = '';
    const rows = [
        ['Q','W','E','R','T','Y','U','I','O','P'],
        ['A','S','D','F','G','H','J','K','L'],
        ['ENTER','Z','X','C','V','B','N','M','DEL']
    ];
    rows.forEach(row => {
        const rowDiv = document.createElement('div');
        rowDiv.className = 'kb-row';
        row.forEach(key => {
            const btn = document.createElement('button');
            btn.className = 'key' + (key.length > 1 ? ' wide' : '');
            btn.textContent = key;
            btn.id = `key-${key}`;
            btn.setAttribute('aria-label', key === 'DEL' ? 'Delete' : key === 'ENTER' ? 'Submit guess' : `Letter ${key}`);
            btn.onclick = () => handleKey(key);
            rowDiv.appendChild(btn);
        });
        kb.appendChild(rowDiv);
    });
}

// --- Handle input ---
function handleKey(key) {
    if (gameOver) return;

    if (key === 'DEL') {
        if (currentCol > 0) {
            currentCol--;
            const cell = document.getElementById(`cell-${currentRow}-${currentCol}`);
            cell.textContent = '';
            cell.className = 'cell';
            cell.setAttribute('aria-label', `Row ${currentRow + 1} Column ${currentCol + 1} Empty`);
        }
    } else if (key === 'ENTER') {
        if (currentCol === 5) submitGuess();
    } else if (currentCol < 5) {
        const cell = document.getElementById(`cell-${currentRow}-${currentCol}`);
        cell.textContent = key;
        cell.className = 'cell filled';
        cell.setAttribute('aria-label', `Row ${currentRow + 1} Column ${currentCol + 1} Letter ${key}`);
        currentCol++;
    }
}

// --- Submit guess ---
function submitGuess() {
    let guess = '';
    for (let c = 0; c < 5; c++) {
        guess += document.getElementById(`cell-${currentRow}-${c}`).textContent;
    }

    // Check if it's a real word (simple check: is it in our list?)
    if (!WORDS.includes(guess.toLowerCase())) {
        showMessage('Not in word list');
        return;
    }

    guesses.push(guess);

    // Score the guess
    const result = scoreGuess(guess, answer);

    // Update grid colors
    for (let c = 0; c < 5; c++) {
        const cell = document.getElementById(`cell-${currentRow}-${c}`);
        cell.className = 'cell ' + result[c];
        const status = result[c] === 'correct' ? 'Green' : result[c] === 'present' ? 'Yellow' : 'Gray';
        cell.setAttribute('aria-label', `Row ${currentRow + 1} Column ${c + 1} Letter ${guess[c]} ${status}`);
    }

    // Update keyboard colors
    for (let c = 0; c < 5; c++) {
        const keyEl = document.getElementById(`key-${guess[c]}`);
        if (keyEl) {
            if (result[c] === 'correct') {
                keyEl.className = 'key correct';
            } else if (result[c] === 'present' && !keyEl.classList.contains('correct')) {
                keyEl.className = 'key present';
            } else if (result[c] === 'absent' && !keyEl.classList.contains('correct') && !keyEl.classList.contains('present')) {
                keyEl.className = 'key absent';
            }
        }
    }

    // Check win/loss
    if (guess === answer) {
        gameOver = true;
        showMessage(`You got it in ${currentRow + 1}! The word was ${answer}`);
        updateStats(true, currentRow + 1);
    } else if (currentRow === 5) {
        gameOver = true;
        showMessage(`The word was ${answer}`);
        updateStats(false, 0);
    } else {
        currentRow++;
        currentCol = 0;
    }
}

// --- Score a guess ---
function scoreGuess(guess, answer) {
    const result = ['absent', 'absent', 'absent', 'absent', 'absent'];
    const answerArr = answer.split('');
    const guessArr = guess.split('');

    // First pass: correct letters
    for (let i = 0; i < 5; i++) {
        if (guessArr[i] === answerArr[i]) {
            result[i] = 'correct';
            answerArr[i] = null;
            guessArr[i] = null;
        }
    }

    // Second pass: present letters
    for (let i = 0; i < 5; i++) {
        if (guessArr[i] && answerArr.includes(guessArr[i])) {
            result[i] = 'present';
            answerArr[answerArr.indexOf(guessArr[i])] = null;
        }
    }

    return result;
}

function showMessage(msg) {
    document.getElementById('message').textContent = msg;
}

function updateStats(won, tries) {
    const stats = JSON.parse(localStorage.getItem('fox-arcade-stats') || '{}');
    if (!stats.wordle) stats.wordle = { played: 0, won: 0, streak: 0, best: null };
    stats.wordle.played++;
    if (won) {
        stats.wordle.won++;
        stats.wordle.streak++;
        if (!stats.wordle.best || tries < stats.wordle.best) stats.wordle.best = tries;
    } else {
        stats.wordle.streak = 0;
    }
    localStorage.setItem('fox-arcade-stats', JSON.stringify(stats));
    showStats();
}

function showStats() {
    const stats = JSON.parse(localStorage.getItem('fox-arcade-stats') || '{}');
    const w = stats.wordle || {};
    document.getElementById('stats').textContent =
        `Played: ${w.played || 0} | Won: ${w.won || 0} | Streak: ${w.streak || 0} | Best: ${w.best || '-'}`;
}

// --- Keyboard input (for ADB keyevents) ---
document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleKey('ENTER');
    else if (e.key === 'Backspace') handleKey('DEL');
    else if (/^[a-zA-Z]$/.test(e.key)) handleKey(e.key.toUpperCase());
});

// --- Init ---
answer = getDailyWord();
buildGrid();
buildKeyboard();
showStats();
</script>
