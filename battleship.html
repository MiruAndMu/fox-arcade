<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Fox Battleship</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #1a1a2e;
    color: #eee;
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
}
.nav { padding: 10px; width: 100%; }
.nav a { color: #f4845f; text-decoration: none; font-size: 14px; }

h1 {
    color: #f4845f;
    font-size: 24px;
    margin: 4px 0 8px;
    text-shadow: 0 0 20px rgba(244, 132, 95, 0.4);
}

.status {
    text-align: center;
    font-size: 14px;
    color: #7f8c8d;
    margin: 4px 0;
    min-height: 20px;
}
.status.hot { color: #e94560; }
.status.good { color: #ffd700; }
.status.win { color: #f4845f; font-size: 18px; }

/* === MENU === */
.screen { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 400px; padding: 0 12px; }
.screen.active { display: flex; }

.menu-btn {
    display: block;
    width: 220px;
    padding: 14px 0;
    margin: 8px auto;
    background: rgba(15, 52, 96, 0.4);
    border: 2px solid #f4845f;
    border-radius: 12px;
    color: #f4845f;
    font-family: 'Courier New', monospace;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
}
.menu-btn:hover, .menu-btn:active {
    background: rgba(244, 132, 95, 0.15);
    transform: scale(1.03);
}
.menu-btn.small {
    width: 160px;
    padding: 10px 0;
    font-size: 14px;
}

.room-code {
    font-size: 32px;
    color: #ffd700;
    letter-spacing: 6px;
    margin: 12px 0;
    text-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
    user-select: all;
}

.room-input {
    background: rgba(15, 52, 96, 0.3);
    border: 2px solid #0f3460;
    border-radius: 8px;
    color: #eee;
    font-family: 'Courier New', monospace;
    font-size: 24px;
    letter-spacing: 4px;
    text-align: center;
    padding: 10px;
    width: 200px;
    outline: none;
    text-transform: uppercase;
}
.room-input:focus { border-color: #f4845f; }

/* === GRID === */
.grid-label {
    font-size: 13px;
    color: #f4845f;
    margin: 8px 0 2px;
    text-align: center;
    opacity: 0.8;
}

.grid-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 2px 0;
}

.grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 2px;
    padding: 6px;
    background: rgba(15, 52, 96, 0.15);
    border-radius: 8px;
    border: 1px solid rgba(15, 52, 96, 0.4);
}

.cell {
    width: 38px;
    height: 38px;
    background: rgba(15, 52, 96, 0.3);
    border: 1px solid rgba(15, 52, 96, 0.6);
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    transition: all 0.15s;
    user-select: none;
}
.cell:hover { background: rgba(15, 52, 96, 0.5); }
.cell.ship { background: rgba(244, 132, 95, 0.3); border-color: #f4845f; }
.cell.hit { background: rgba(233, 69, 96, 0.5); border-color: #e94560; }
.cell.miss { background: rgba(127, 140, 141, 0.2); border-color: rgba(127, 140, 141, 0.4); }
.cell.sunk { background: rgba(233, 69, 96, 0.7); border-color: #e94560; }
.cell.preview { background: rgba(244, 132, 95, 0.15); border-color: rgba(244, 132, 95, 0.5); }
.cell.invalid { background: rgba(233, 69, 96, 0.15); border-color: rgba(233, 69, 96, 0.5); }
.cell.target:hover { background: rgba(255, 215, 0, 0.2); border-color: #ffd700; }

/* === SHIP ROSTER === */
.ship-roster {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    margin: 6px 0;
}
.ship-tag {
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    border: 1px solid rgba(15, 52, 96, 0.6);
    background: rgba(15, 52, 96, 0.2);
    color: #7f8c8d;
    cursor: pointer;
    transition: all 0.2s;
}
.ship-tag.active {
    border-color: #f4845f;
    color: #f4845f;
    background: rgba(244, 132, 95, 0.1);
}
.ship-tag.placed {
    border-color: rgba(127, 140, 141, 0.3);
    color: rgba(127, 140, 141, 0.5);
    text-decoration: line-through;
}
.ship-tag.sunk-tag {
    border-color: #e94560;
    color: #e94560;
    text-decoration: line-through;
}

.controls {
    display: flex;
    gap: 8px;
    margin: 6px 0;
    flex-wrap: wrap;
    justify-content: center;
}

.hint {
    font-size: 12px;
    color: #7f8c8d;
    text-align: center;
    margin: 4px 0;
}

/* === TURN INDICATOR === */
.turn-bar {
    width: 100%;
    max-width: 340px;
    padding: 8px;
    border-radius: 8px;
    text-align: center;
    font-size: 14px;
    margin: 6px 0;
    transition: all 0.3s;
}
.turn-bar.your-turn {
    background: rgba(244, 132, 95, 0.15);
    border: 1px solid #f4845f;
    color: #f4845f;
}
.turn-bar.their-turn {
    background: rgba(15, 52, 96, 0.15);
    border: 1px solid #0f3460;
    color: #7f8c8d;
}

/* === FLEET STATUS === */
.fleet-row {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin: 4px 0;
    font-size: 12px;
}
.fleet-row .label { color: #7f8c8d; }
.fleet-row .count { color: #f4845f; font-weight: bold; }

/* === ANIMATIONS === */
@keyframes boom {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
}
.cell.just-hit { animation: boom 0.3s ease; }

@keyframes splash {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(0.8); opacity: 0.7; }
}
.cell.just-miss { animation: splash 0.3s ease; }
</style>
</head>
<body>

<div class="nav"><a href="index.html">← Back to Arcade</a></div>
<h1>🚢 Fox Battleship</h1>

<!-- MENU SCREEN -->
<div id="menu-screen" class="screen active">
    <p style="color:#7f8c8d; margin: 12px 0; text-align:center; font-size:13px;">
        Place your fleet. Sink theirs first. 🦊
    </p>
    <button class="menu-btn" onclick="startSolo()">🎯 Solo Mission</button>
    <button class="menu-btn" onclick="showCreate()">🔗 Create Room</button>
    <button class="menu-btn" onclick="showJoin()">🚪 Join Room</button>
</div>

<!-- CREATE ROOM SCREEN -->
<div id="create-screen" class="screen">
    <p style="color:#7f8c8d; margin: 8px 0; font-size:13px;">Share this code:</p>
    <div id="room-code-display" class="room-code">...</div>
    <div id="create-status" class="status">Waiting for opponent...</div>
    <button class="menu-btn small" onclick="backToMenu()">Cancel</button>
</div>

<!-- JOIN ROOM SCREEN -->
<div id="join-screen" class="screen">
    <p style="color:#7f8c8d; margin: 8px 0; font-size:13px;">Enter room code:</p>
    <input id="room-input" class="room-input" maxlength="6" placeholder="------" autocomplete="off" spellcheck="false">
    <button class="menu-btn small" style="margin-top:10px" onclick="joinRoom()">Join</button>
    <div id="join-status" class="status"></div>
    <button class="menu-btn small" onclick="backToMenu()">Back</button>
</div>

<!-- PLACEMENT SCREEN -->
<div id="place-screen" class="screen">
    <div class="grid-label">Place Your Fleet</div>
    <div class="ship-roster" id="ship-roster"></div>
    <div class="hint" id="place-hint">Tap a ship, then tap the grid. Tap ship again to rotate.</div>
    <div class="grid-container">
        <div class="grid" id="place-grid"></div>
    </div>
    <div class="controls">
        <button class="menu-btn small" id="random-btn" onclick="randomPlace()">🎲 Random</button>
        <button class="menu-btn small" id="ready-btn" onclick="confirmPlacement()" style="display:none">✅ Ready!</button>
    </div>
</div>

<!-- BATTLE SCREEN -->
<div id="battle-screen" class="screen">
    <div class="turn-bar" id="turn-bar">...</div>
    <div class="fleet-row">
        <span><span class="label">Theirs: </span><span class="count" id="their-remaining">5</span></span>
        <span><span class="label">Yours: </span><span class="count" id="your-remaining">5</span></span>
    </div>
    <div class="grid-label">🎯 Enemy Waters</div>
    <div class="grid-container">
        <div class="grid" id="attack-grid"></div>
    </div>
    <div class="grid-label">🛡️ Your Fleet</div>
    <div class="grid-container">
        <div class="grid" id="defense-grid"></div>
    </div>
</div>

<!-- GAME OVER SCREEN -->
<div id="over-screen" class="screen">
    <div id="over-message" class="status win" style="font-size:22px; margin:20px 0;"></div>
    <div id="over-stats" style="color:#7f8c8d; font-size:13px; text-align:center; margin:8px 0;"></div>
    <button class="menu-btn" onclick="backToMenu()">Play Again</button>
</div>

<script>
// === GAME CONSTANTS ===
const GRID = 8;
const SHIPS = [
    { name: 'Fox Den', emoji: '🦊', size: 5 },
    { name: 'Cow Carrier', emoji: '🐮', size: 4 },
    { name: 'Kitsune', emoji: '🦊', size: 3 },
    { name: "Ba's Boat", emoji: '🐑', size: 3 },
    { name: 'Sushi Sub', emoji: '🍣', size: 2 },
];
const TOTAL_SHIP_CELLS = SHIPS.reduce((s, sh) => s + sh.size, 0);

// === GAME STATE ===
let mode = 'solo'; // 'solo' | 'multi'
let peer = null;
let conn = null;
let isHost = false;
let myBoard = [];     // 0=empty, shipIndex+1=ship
let enemyBoard = [];  // 0=unknown, 'miss', 'hit', 'sunk'
let myHits = [];      // what enemy has done to me: 0=untouched, 'miss', 'hit', 'sunk'
let myShips = [];     // [{...ship, cells:[[r,c],...], sunk:false}]
let enemyShips = [];  // for solo mode AI ships
let myTurn = false;
let gameOver = false;
let shotsFired = 0;

// placement state
let selectedShipIdx = null;
let shipDirection = 'h'; // 'h' or 'v'
let placedShips = [];

// AI state
let aiHits = [];      // cells AI has hit but not yet sunk
let aiQueue = [];      // cells AI wants to try next

// === SCREEN MANAGEMENT ===
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function backToMenu() {
    if (peer) { peer.destroy(); peer = null; }
    conn = null;
    gameOver = false;
    shotsFired = 0;
    showScreen('menu-screen');
}

// === SOLO MODE ===
function startSolo() {
    mode = 'solo';
    initPlacement();
}

// === MULTIPLAYER ===
function genCode() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let code = '';
    for (let i = 0; i < 5; i++) code += chars[Math.floor(Math.random() * chars.length)];
    return code;
}

function showCreate() {
    showScreen('create-screen');
    const code = genCode();
    document.getElementById('room-code-display').textContent = code;
    document.getElementById('create-status').textContent = 'Waiting for opponent...';

    peer = new Peer('fox-battle-' + code);
    isHost = true;

    peer.on('open', () => {
        document.getElementById('create-status').textContent = 'Room ready! Waiting for opponent...';
    });

    peer.on('connection', (c) => {
        conn = c;
        document.getElementById('create-status').textContent = 'Opponent joined!';
        setupConn();
        setTimeout(() => {
            mode = 'multi';
            initPlacement();
        }, 500);
    });

    peer.on('error', (err) => {
        document.getElementById('create-status').textContent = 'Error: ' + err.type;
        document.getElementById('create-status').className = 'status hot';
    });
}

function showJoin() {
    showScreen('join-screen');
    document.getElementById('room-input').value = '';
    document.getElementById('join-status').textContent = '';
    setTimeout(() => document.getElementById('room-input').focus(), 100);
}

function joinRoom() {
    const code = document.getElementById('room-input').value.trim().toUpperCase();
    if (code.length < 4) {
        document.getElementById('join-status').textContent = 'Enter the room code!';
        document.getElementById('join-status').className = 'status hot';
        return;
    }

    document.getElementById('join-status').textContent = 'Connecting...';
    document.getElementById('join-status').className = 'status';

    peer = new Peer();
    isHost = false;

    peer.on('open', () => {
        conn = peer.connect('fox-battle-' + code, { reliable: true });
        conn.on('open', () => {
            document.getElementById('join-status').textContent = 'Connected!';
            document.getElementById('join-status').className = 'status good';
            setupConn();
            setTimeout(() => {
                mode = 'multi';
                initPlacement();
            }, 500);
        });
        conn.on('error', () => {
            document.getElementById('join-status').textContent = 'Could not connect!';
            document.getElementById('join-status').className = 'status hot';
        });
    });

    peer.on('error', (err) => {
        document.getElementById('join-status').textContent = 'Error: ' + err.type;
        document.getElementById('join-status').className = 'status hot';
    });
}

function setupConn() {
    conn.on('data', (data) => {
        handleMessage(data);
    });
    conn.on('close', () => {
        if (!gameOver) {
            document.getElementById('turn-bar').textContent = 'Opponent disconnected!';
            document.getElementById('turn-bar').className = 'turn-bar their-turn';
        }
    });
}

function sendMsg(msg) {
    if (conn && conn.open) conn.send(msg);
}

// === PLACEMENT ===
function initPlacement() {
    myBoard = Array.from({length: GRID}, () => Array(GRID).fill(0));
    placedShips = [];
    selectedShipIdx = null;
    shipDirection = 'h';

    showScreen('place-screen');
    renderShipRoster();
    renderPlaceGrid();
    document.getElementById('ready-btn').style.display = 'none';
    document.getElementById('place-hint').textContent = 'Tap a ship, then tap the grid. Tap ship again to rotate.';
}

function renderShipRoster() {
    const roster = document.getElementById('ship-roster');
    roster.innerHTML = '';
    SHIPS.forEach((ship, i) => {
        const tag = document.createElement('div');
        tag.className = 'ship-tag' + (placedShips.includes(i) ? ' placed' : '') + (selectedShipIdx === i ? ' active' : '');
        tag.textContent = `${ship.emoji} ${ship.name} (${ship.size})`;
        tag.onclick = () => {
            if (placedShips.includes(i)) return;
            if (selectedShipIdx === i) {
                shipDirection = shipDirection === 'h' ? 'v' : 'h';
            } else {
                selectedShipIdx = i;
            }
            renderShipRoster();
            renderPlaceGrid();
            document.getElementById('place-hint').textContent =
                `Placing ${ship.emoji} ${ship.name} (${ship.size}) — ${shipDirection === 'h' ? 'horizontal' : 'vertical'}. Tap again to rotate.`;
        };
        roster.appendChild(tag);
    });
}

function renderPlaceGrid() {
    const grid = document.getElementById('place-grid');
    grid.innerHTML = '';
    for (let r = 0; r < GRID; r++) {
        for (let c = 0; c < GRID; c++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            if (myBoard[r][c] > 0) {
                cell.className += ' ship';
                const shipIdx = myBoard[r][c] - 1;
                cell.textContent = SHIPS[shipIdx].emoji;
            }
            cell.onclick = () => placeShipAt(r, c);
            cell.onmouseenter = () => previewShip(r, c);
            grid.appendChild(cell);
        }
    }
}

function previewShip(r, c) {
    if (selectedShipIdx === null) return;
    const ship = SHIPS[selectedShipIdx];
    const cells = getShipCells(r, c, ship.size, shipDirection);
    const valid = cells && canPlace(cells);

    const gridEl = document.getElementById('place-grid');
    const allCells = gridEl.querySelectorAll('.cell');
    // clear old previews
    allCells.forEach(cell => {
        cell.classList.remove('preview', 'invalid');
    });

    if (cells) {
        cells.forEach(([cr, cc]) => {
            const idx = cr * GRID + cc;
            if (idx < allCells.length) {
                allCells[idx].classList.add(valid ? 'preview' : 'invalid');
            }
        });
    }
}

function getShipCells(r, c, size, dir) {
    const cells = [];
    for (let i = 0; i < size; i++) {
        const nr = dir === 'v' ? r + i : r;
        const nc = dir === 'h' ? c + i : c;
        if (nr >= GRID || nc >= GRID) return null;
        cells.push([nr, nc]);
    }
    return cells;
}

function canPlace(cells) {
    return cells.every(([r, c]) => myBoard[r][c] === 0);
}

function placeShipAt(r, c) {
    if (selectedShipIdx === null) return;
    const ship = SHIPS[selectedShipIdx];
    const cells = getShipCells(r, c, ship.size, shipDirection);
    if (!cells || !canPlace(cells)) return;

    cells.forEach(([cr, cc]) => {
        myBoard[cr][cc] = selectedShipIdx + 1;
    });
    placedShips.push(selectedShipIdx);

    // auto-select next unplaced ship
    selectedShipIdx = null;
    for (let i = 0; i < SHIPS.length; i++) {
        if (!placedShips.includes(i)) { selectedShipIdx = i; break; }
    }

    renderShipRoster();
    renderPlaceGrid();

    if (placedShips.length === SHIPS.length) {
        document.getElementById('ready-btn').style.display = '';
        document.getElementById('place-hint').textContent = 'All ships placed! Hit Ready when set.';
        selectedShipIdx = null;
        renderShipRoster();
    } else if (selectedShipIdx !== null) {
        const next = SHIPS[selectedShipIdx];
        document.getElementById('place-hint').textContent =
            `Placing ${next.emoji} ${next.name} (${next.size}) — ${shipDirection === 'h' ? 'horizontal' : 'vertical'}`;
    }
}

function randomPlace() {
    myBoard = Array.from({length: GRID}, () => Array(GRID).fill(0));
    placedShips = [];

    SHIPS.forEach((ship, idx) => {
        let placed = false;
        let attempts = 0;
        while (!placed && attempts < 200) {
            const dir = Math.random() < 0.5 ? 'h' : 'v';
            const r = Math.floor(Math.random() * GRID);
            const c = Math.floor(Math.random() * GRID);
            const cells = getShipCells(r, c, ship.size, dir);
            if (cells && canPlace(cells)) {
                cells.forEach(([cr, cc]) => { myBoard[cr][cc] = idx + 1; });
                placedShips.push(idx);
                placed = true;
            }
            attempts++;
        }
    });

    selectedShipIdx = null;
    renderShipRoster();
    renderPlaceGrid();

    if (placedShips.length === SHIPS.length) {
        document.getElementById('ready-btn').style.display = '';
        document.getElementById('place-hint').textContent = 'All ships placed! Hit Ready when set.';
    }
}

function buildMyShips() {
    myShips = SHIPS.map((ship, idx) => {
        const cells = [];
        for (let r = 0; r < GRID; r++)
            for (let c = 0; c < GRID; c++)
                if (myBoard[r][c] === idx + 1) cells.push([r, c]);
        return { ...ship, idx, cells, sunk: false };
    });
}

function confirmPlacement() {
    buildMyShips();

    if (mode === 'solo') {
        setupSoloGame();
    } else {
        // send ready to opponent
        sendMsg({ type: 'ready', board: myBoard });
        document.getElementById('place-hint').textContent = 'Waiting for opponent...';
        document.getElementById('ready-btn').style.display = 'none';
        document.getElementById('random-btn').style.display = 'none';
    }
}

// === SOLO GAME ===
let aiBoard = [];

function setupSoloGame() {
    // generate AI board
    aiBoard = Array.from({length: GRID}, () => Array(GRID).fill(0));
    enemyShips = [];

    SHIPS.forEach((ship, idx) => {
        let placed = false;
        let attempts = 0;
        while (!placed && attempts < 200) {
            const dir = Math.random() < 0.5 ? 'h' : 'v';
            const r = Math.floor(Math.random() * GRID);
            const c = Math.floor(Math.random() * GRID);
            const cells = getShipCells(r, c, ship.size, dir);
            if (cells && cells.every(([cr, cc]) => aiBoard[cr][cc] === 0)) {
                cells.forEach(([cr, cc]) => { aiBoard[cr][cc] = idx + 1; });
                enemyShips.push({ ...ship, idx, cells, sunk: false });
                placed = true;
            }
            attempts++;
        }
    });

    enemyBoard = Array.from({length: GRID}, () => Array(GRID).fill(0));
    myHits = Array.from({length: GRID}, () => Array(GRID).fill(0));
    aiHits = [];
    aiQueue = [];
    myTurn = true;
    gameOver = false;
    shotsFired = 0;

    startBattle();
}

// === MULTIPLAYER GAME ===
let opponentReady = false;
let meReady = false;

function handleMessage(data) {
    switch(data.type) {
        case 'ready':
            opponentReady = true;
            if (meReady) startMultiBattle();
            break;
        case 'fire':
            handleIncomingFire(data.r, data.c);
            break;
        case 'result':
            handleFireResult(data.r, data.c, data.result, data.shipName, data.shipCells);
            break;
        case 'turn':
            myTurn = true;
            updateTurnBar();
            break;
    }
}

function startMultiBattle() {
    enemyBoard = Array.from({length: GRID}, () => Array(GRID).fill(0));
    myHits = Array.from({length: GRID}, () => Array(GRID).fill(0));
    myTurn = isHost; // host goes first
    gameOver = false;
    shotsFired = 0;
    startBattle();
}

function startBattle() {
    showScreen('battle-screen');
    renderAttackGrid();
    renderDefenseGrid();
    updateTurnBar();
    updateFleetCounts();
}

// === BATTLE RENDERING ===
function renderAttackGrid() {
    const grid = document.getElementById('attack-grid');
    grid.innerHTML = '';
    for (let r = 0; r < GRID; r++) {
        for (let c = 0; c < GRID; c++) {
            const cell = document.createElement('div');
            const val = enemyBoard[r][c];
            cell.className = 'cell';
            if (val === 'hit') {
                cell.className += ' hit';
                cell.textContent = '🔥';
            } else if (val === 'miss') {
                cell.className += ' miss';
                cell.textContent = '•';
            } else if (val === 'sunk') {
                cell.className += ' sunk';
                cell.textContent = '💀';
            } else if (myTurn && !gameOver) {
                cell.className += ' target';
            }
            cell.onclick = () => fireAt(r, c);
            grid.appendChild(cell);
        }
    }
}

function renderDefenseGrid() {
    const grid = document.getElementById('defense-grid');
    grid.innerHTML = '';
    for (let r = 0; r < GRID; r++) {
        for (let c = 0; c < GRID; c++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            const hitVal = myHits[r][c];
            if (hitVal === 'hit') {
                cell.className += ' hit';
                cell.textContent = '🔥';
            } else if (hitVal === 'miss') {
                cell.className += ' miss';
                cell.textContent = '•';
            } else if (hitVal === 'sunk') {
                cell.className += ' sunk';
                cell.textContent = '💀';
            } else if (myBoard[r][c] > 0) {
                cell.className += ' ship';
                cell.textContent = SHIPS[myBoard[r][c] - 1].emoji;
            }
            grid.appendChild(cell);
        }
    }
}

function updateTurnBar() {
    const bar = document.getElementById('turn-bar');
    if (gameOver) return;
    if (myTurn) {
        bar.textContent = '🎯 Your turn — fire!';
        bar.className = 'turn-bar your-turn';
    } else {
        bar.textContent = mode === 'solo' ? '🤖 AI thinking...' : '⏳ Opponent\'s turn...';
        bar.className = 'turn-bar their-turn';
    }
}

function updateFleetCounts() {
    const theirSunk = mode === 'solo'
        ? enemyShips.filter(s => s.sunk).length
        : countSunkFromBoard(enemyBoard);
    const mySunk = myShips.filter(s => s.sunk).length;
    document.getElementById('their-remaining').textContent = (SHIPS.length - theirSunk);
    document.getElementById('your-remaining').textContent = (SHIPS.length - mySunk);
}

function countSunkFromBoard(board) {
    const sunkCells = new Set();
    for (let r = 0; r < GRID; r++)
        for (let c = 0; c < GRID; c++)
            if (board[r][c] === 'sunk') sunkCells.add(`${r},${c}`);
    // count distinct ships sunk (rough estimate by counting sunk groups)
    // actually track it properly via a counter
    return window._enemySunkCount || 0;
}

window._enemySunkCount = 0;

// === FIRING ===
function fireAt(r, c) {
    if (!myTurn || gameOver) return;
    if (enemyBoard[r][c] !== 0) return; // already fired here

    shotsFired++;

    if (mode === 'solo') {
        // check AI board
        const val = aiBoard[r][c];
        if (val > 0) {
            enemyBoard[r][c] = 'hit';
            const ship = enemyShips[val - 1];
            const allHit = ship.cells.every(([sr, sc]) => enemyBoard[sr][sc] === 'hit');
            if (allHit) {
                ship.sunk = true;
                ship.cells.forEach(([sr, sc]) => { enemyBoard[sr][sc] = 'sunk'; });
                window._enemySunkCount++;
            }
            animateCell('attack-grid', r, c, 'just-hit');
        } else {
            enemyBoard[r][c] = 'miss';
            animateCell('attack-grid', r, c, 'just-miss');
        }

        renderAttackGrid();
        updateFleetCounts();

        // check win
        if (enemyShips.every(s => s.sunk)) {
            endGame(true);
            return;
        }

        // AI turn
        myTurn = false;
        updateTurnBar();
        setTimeout(aiTurn, 600 + Math.random() * 800);

    } else {
        // multiplayer: send fire
        myTurn = false;
        sendMsg({ type: 'fire', r, c });
        updateTurnBar();
    }
}

function handleIncomingFire(r, c) {
    const val = myBoard[r][c];
    let result = 'miss';
    let shipName = null;
    let shipCells = null;

    if (val > 0) {
        myHits[r][c] = 'hit';
        const ship = myShips[val - 1];
        const allHit = ship.cells.every(([sr, sc]) => myHits[sr][sc] === 'hit');
        if (allHit) {
            ship.sunk = true;
            ship.cells.forEach(([sr, sc]) => { myHits[sr][sc] = 'sunk'; });
            result = 'sunk';
            shipName = ship.name;
            shipCells = ship.cells;
        } else {
            result = 'hit';
        }
    } else {
        myHits[r][c] = 'miss';
    }

    renderDefenseGrid();
    updateFleetCounts();

    // send result back
    sendMsg({ type: 'result', r, c, result, shipName, shipCells });

    // check if I lost
    if (myShips.every(s => s.sunk)) {
        endGame(false);
        return;
    }

    // give them feedback, then it's my turn
    setTimeout(() => {
        myTurn = true;
        sendMsg({ type: 'turn' });
        updateTurnBar();
        renderAttackGrid();
    }, 300);
}

function handleFireResult(r, c, result, shipName, shipCells) {
    if (result === 'miss') {
        enemyBoard[r][c] = 'miss';
        animateCell('attack-grid', r, c, 'just-miss');
    } else if (result === 'hit') {
        enemyBoard[r][c] = 'hit';
        animateCell('attack-grid', r, c, 'just-hit');
    } else if (result === 'sunk') {
        if (shipCells) {
            shipCells.forEach(([sr, sc]) => { enemyBoard[sr][sc] = 'sunk'; });
        } else {
            enemyBoard[r][c] = 'sunk';
        }
        window._enemySunkCount++;
        animateCell('attack-grid', r, c, 'just-hit');
    }

    renderAttackGrid();
    updateFleetCounts();

    // check win
    if (window._enemySunkCount >= SHIPS.length) {
        endGame(true);
    }
}

function animateCell(gridId, r, c, cls) {
    const grid = document.getElementById(gridId);
    const idx = r * GRID + c;
    const cell = grid.children[idx];
    if (cell) {
        cell.classList.add(cls);
        setTimeout(() => cell.classList.remove(cls), 400);
    }
}

// === AI ===
function aiTurn() {
    if (gameOver) return;

    let r, c;

    if (aiQueue.length > 0) {
        // target mode: try queued cells
        [r, c] = aiQueue.shift();
        // skip if already fired
        while (myHits[r][c] !== 0 && aiQueue.length > 0) {
            [r, c] = aiQueue.shift();
        }
        if (myHits[r][c] !== 0) {
            // queue empty or all tried, go random
            [r, c] = aiRandomShot();
        }
    } else {
        [r, c] = aiRandomShot();
    }

    const val = myBoard[r][c];
    if (val > 0) {
        myHits[r][c] = 'hit';
        const ship = myShips[val - 1];
        const allHit = ship.cells.every(([sr, sc]) => myHits[sr][sc] === 'hit');

        if (allHit) {
            ship.sunk = true;
            ship.cells.forEach(([sr, sc]) => { myHits[sr][sc] = 'sunk'; });
            // clear AI queue of cells related to this ship
            aiQueue = aiQueue.filter(([qr, qc]) => myBoard[qr][qc] !== val);
        } else {
            // add adjacent cells to queue
            addAdjacentToQueue(r, c);
        }
        animateCell('defense-grid', r, c, 'just-hit');
    } else {
        myHits[r][c] = 'miss';
        animateCell('defense-grid', r, c, 'just-miss');
    }

    renderDefenseGrid();
    updateFleetCounts();

    if (myShips.every(s => s.sunk)) {
        endGame(false);
        return;
    }

    myTurn = true;
    updateTurnBar();
    renderAttackGrid();
}

function aiRandomShot() {
    let r, c;
    let attempts = 0;
    do {
        r = Math.floor(Math.random() * GRID);
        c = Math.floor(Math.random() * GRID);
        attempts++;
    } while (myHits[r][c] !== 0 && attempts < 200);
    return [r, c];
}

function addAdjacentToQueue(r, c) {
    const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
    dirs.forEach(([dr, dc]) => {
        const nr = r + dr;
        const nc = c + dc;
        if (nr >= 0 && nr < GRID && nc >= 0 && nc < GRID && myHits[nr][nc] === 0) {
            if (!aiQueue.some(([qr, qc]) => qr === nr && qc === nc)) {
                aiQueue.push([nr, nc]);
            }
        }
    });
}

// === GAME OVER ===
function endGame(won) {
    gameOver = true;
    const bar = document.getElementById('turn-bar');

    if (won) {
        bar.textContent = '🎉 You sunk their fleet!';
        bar.className = 'turn-bar your-turn';
    } else {
        bar.textContent = '💀 Your fleet was sunk!';
        bar.className = 'turn-bar their-turn';
    }

    // show game over after a moment
    setTimeout(() => {
        showScreen('over-screen');
        document.getElementById('over-message').textContent = won
            ? '🎉 Victory! Fleet destroyed!'
            : '💀 Defeated! Your fleet sank!';
        document.getElementById('over-stats').textContent = `Shots fired: ${shotsFired} | Mode: ${mode === 'solo' ? 'Solo' : 'Multiplayer'}`;
        window._enemySunkCount = 0;
    }, 1500);
}

// === MULTIPLAYER READY SYNC ===
const origConfirm = confirmPlacement;
confirmPlacement = function() {
    buildMyShips();

    if (mode === 'solo') {
        setupSoloGame();
    } else {
        meReady = true;
        sendMsg({ type: 'ready', board: myBoard });
        document.getElementById('place-hint').textContent = 'Waiting for opponent...';
        document.getElementById('ready-btn').style.display = 'none';
        document.getElementById('random-btn').style.display = 'none';
        if (opponentReady) startMultiBattle();
    }
};
