<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fox Canvas</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #1a1a2e;
    color: #eee;
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
}
.nav { padding: 10px; width: 100%; }
.nav a { color: #f4845f; text-decoration: none; font-size: 14px; }
h1 { color: #f4845f; font-size: 28px; margin: 5px 0; }

.toolbar {
    display: flex;
    gap: 8px;
    margin: 8px 0;
    flex-wrap: wrap;
    justify-content: center;
}
.tool-btn {
    padding: 8px 14px;
    border: 2px solid #0f3460;
    border-radius: 6px;
    background: #16213e;
    color: #eee;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    cursor: pointer;
}
.tool-btn.active { border-color: #f4845f; background: #1a2744; }

.palette {
    display: flex;
    gap: 4px;
    margin: 8px 0;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 340px;
}
.color-btn {
    width: 32px;
    height: 32px;
    border: 2px solid #333;
    border-radius: 4px;
    cursor: pointer;
}
.color-btn.active { border-color: #fff; border-width: 3px; }

.grid-container {
    margin: 8px 0;
    display: inline-block;
    border: 2px solid #0f3460;
    border-radius: 4px;
    background: #fff;
}
.pixel-grid {
    display: grid;
    gap: 0;
}
.pixel {
    width: 20px;
    height: 20px;
    border: 0.5px solid #e0e0e0;
    background: #ffffff;
    cursor: pointer;
}

.actions {
    display: flex;
    gap: 8px;
    margin: 10px 0;
}
.action-btn {
    padding: 10px 18px;
    border: 2px solid #0f3460;
    border-radius: 6px;
    background: #16213e;
    color: #eee;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    cursor: pointer;
}
.action-btn:active { background: #1a2744; }

.size-info {
    font-size: 12px;
    color: #7f8c8d;
    margin: 5px 0;
}
</style>
</head>
<body>

<div class="nav"><a href="index.html" aria-label="Back to Fox Arcade">Back to Arcade</a></div>
<h1>Fox Canvas</h1>

<div class="toolbar" id="toolbar">
    <button class="tool-btn active" id="tool-pen" aria-label="Pen tool" onclick="setTool('pen')">Pen</button>
    <button class="tool-btn" id="tool-eraser" aria-label="Eraser tool" onclick="setTool('eraser')">Eraser</button>
    <button class="tool-btn" id="tool-fill" aria-label="Fill tool" onclick="setTool('fill')">Fill</button>
</div>

<div class="palette" id="palette"></div>

<div class="size-info" id="size-info">16 x 16</div>

<div class="grid-container">
    <div class="pixel-grid" id="pixel-grid"></div>
</div>

<div class="actions">
    <button class="action-btn" aria-label="Clear canvas" onclick="clearCanvas()">Clear</button>
    <button class="action-btn" aria-label="Save artwork" onclick="saveArt()">Save</button>
    <button class="action-btn" aria-label="New canvas" onclick="newCanvas()">New</button>
</div>

<div class="size-info" id="save-msg"></div>

<script>
const GRID_SIZE = 16;
const COLORS = [
    '#000000', '#ffffff', '#ff0000', '#ff6600', '#ffcc00', '#ffff00',
    '#00cc00', '#00ff00', '#0066ff', '#0000ff', '#6600cc', '#cc00ff',
    '#ff66cc', '#996633', '#666666', '#cccccc',
    '#1a1a2e', '#f4845f', '#e94560', '#0f3460',
    '#538d4e', '#b59f3b', '#87ceeb', '#ffd700'
];

let currentColor = '#000000';
let currentTool = 'pen';
let grid = [];
let isDrawing = false;

// Build palette
function buildPalette() {
    const palette = document.getElementById('palette');
    COLORS.forEach((color, i) => {
        const btn = document.createElement('button');
        btn.className = 'color-btn' + (i === 0 ? ' active' : '');
        btn.style.background = color;
        btn.id = `color-${i}`;
        btn.setAttribute('aria-label', `Color ${color}`);
        btn.onclick = () => selectColor(color, i);
        palette.appendChild(btn);
    });
}

function selectColor(color, index) {
    currentColor = color;
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`color-${index}`).classList.add('active');
}

function setTool(tool) {
    currentTool = tool;
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`tool-${tool}`).classList.add('active');
}

// Build grid
function buildGrid() {
    const container = document.getElementById('pixel-grid');
    container.innerHTML = '';
    container.style.gridTemplateColumns = `repeat(${GRID_SIZE}, 20px)`;
    grid = [];

    for (let r = 0; r < GRID_SIZE; r++) {
        grid[r] = [];
        for (let c = 0; c < GRID_SIZE; c++) {
            const pixel = document.createElement('div');
            pixel.className = 'pixel';
            pixel.id = `pixel-${r}-${c}`;
            pixel.setAttribute('aria-label', `Pixel row ${r + 1} column ${c + 1}`);
            pixel.dataset.row = r;
            pixel.dataset.col = c;
            pixel.dataset.color = '#ffffff';

            pixel.onmousedown = (e) => { isDrawing = true; paintPixel(r, c); e.preventDefault(); };
            pixel.onmouseenter = () => { if (isDrawing) paintPixel(r, c); };
            pixel.ontouchstart = (e) => { paintPixel(r, c); e.preventDefault(); };
            pixel.onclick = () => paintPixel(r, c);

            container.appendChild(pixel);
            grid[r][c] = pixel;
        }
    }
}

document.addEventListener('mouseup', () => isDrawing = false);

function paintPixel(r, c) {
    const pixel = grid[r][c];
    if (currentTool === 'pen') {
        pixel.style.background = currentColor;
        pixel.dataset.color = currentColor;
        pixel.setAttribute('aria-label', `Pixel row ${r + 1} column ${c + 1} colored ${currentColor}`);
    } else if (currentTool === 'eraser') {
        pixel.style.background = '#ffffff';
        pixel.dataset.color = '#ffffff';
        pixel.setAttribute('aria-label', `Pixel row ${r + 1} column ${c + 1}`);
    } else if (currentTool === 'fill') {
        floodFill(r, c, pixel.dataset.color, currentColor);
    }
}

function floodFill(r, c, targetColor, fillColor) {
    if (targetColor === fillColor) return;
    if (r < 0 || r >= GRID_SIZE || c < 0 || c >= GRID_SIZE) return;
    if (grid[r][c].dataset.color !== targetColor) return;

    grid[r][c].style.background = fillColor;
    grid[r][c].dataset.color = fillColor;
    grid[r][c].setAttribute('aria-label', `Pixel row ${r + 1} column ${c + 1} colored ${fillColor}`);

    floodFill(r + 1, c, targetColor, fillColor);
    floodFill(r - 1, c, targetColor, fillColor);
    floodFill(r, c + 1, targetColor, fillColor);
    floodFill(r, c - 1, targetColor, fillColor);
}

function clearCanvas() {
    for (let r = 0; r < GRID_SIZE; r++) {
        for (let c = 0; c < GRID_SIZE; c++) {
            grid[r][c].style.background = '#ffffff';
            grid[r][c].dataset.color = '#ffffff';
        }
    }
    document.getElementById('save-msg').textContent = 'Canvas cleared';
}

function saveArt() {
    // Save to localStorage
    const artData = [];
    for (let r = 0; r < GRID_SIZE; r++) {
        for (let c = 0; c < GRID_SIZE; c++) {
            const color = grid[r][c].dataset.color;
            if (color !== '#ffffff') {
                artData.push({ r, c, color });
            }
        }
    }

    const stats = JSON.parse(localStorage.getItem('fox-arcade-stats') || '{}');
    if (!stats.canvas) stats.canvas = { count: 0, artworks: [] };
    stats.canvas.count++;
    stats.canvas.artworks.push({
        id: stats.canvas.count,
        date: new Date().toISOString(),
        pixels: artData.length,
        data: artData
    });
    // Keep last 20 artworks
    stats.canvas.artworks = stats.canvas.artworks.slice(-20);
    localStorage.setItem('fox-arcade-stats', JSON.stringify(stats));

    document.getElementById('save-msg').textContent = `Saved! Artwork #${stats.canvas.count} (${artData.length} pixels)`;
}

function newCanvas() {
    clearCanvas();
    document.getElementById('save-msg').textContent = 'New canvas ready';
}

// Init
buildPalette();
buildGrid();
</script>

</body>
</html>
