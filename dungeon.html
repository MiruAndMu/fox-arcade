<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fox Mystery Dungeon</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #0a0a18;
    color: #eee;
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
}
.nav { padding: 10px; width: 100%; }
.nav a { color: #f4845f; text-decoration: none; font-size: 14px; }
h1 {
    color: #f4845f;
    font-size: 24px;
    margin: 5px 0;
    text-shadow: 0 0 12px #f4845f66, 0 0 24px #f4845f33;
    letter-spacing: 2px;
}

/* --- HUD --- */
.hud {
    display: flex;
    gap: 14px;
    font-size: 14px;
    margin: 5px 0;
    flex-wrap: wrap;
    justify-content: center;
    background: #0d0d22;
    border: 1px solid #1e1e42;
    border-radius: 6px;
    padding: 6px 12px;
}
.hud .hp { color: #e94560; text-shadow: 0 0 6px #e9456055; }
.hud .floor { color: #f4845f; text-shadow: 0 0 6px #f4845f44; }
.hud .atk { color: #ffcc00; text-shadow: 0 0 6px #ffcc0044; }
.hud .shield { color: #87ceeb; text-shadow: 0 0 6px #87ceeb44; }
.hud .gold { color: #ffd700; text-shadow: 0 0 6px #ffd70044; }
.hud .keys { color: #ffd700; }

/* --- Log --- */
.log {
    width: 90%;
    max-width: 400px;
    height: 48px;
    overflow: hidden;
    text-align: center;
    font-size: 13px;
    color: #7f8c8d;
    margin: 4px 0;
    line-height: 24px;
}
.log-info { color: #9aa5b4; }
.log-hit { color: #e94560; text-shadow: 0 0 6px #e9456066; }
.log-heal { color: #56d3a0; text-shadow: 0 0 6px #56d3a044; }
.log-pickup { color: #ffd700; text-shadow: 0 0 6px #ffd70044; }
.log-floor { color: #87ceeb; text-shadow: 0 0 6px #87ceeb44; }
.log-shield { color: #87ceeb; }
.log-warn { color: #f4845f; }

/* --- Dungeon grid --- */
.dungeon-container {
    margin: 6px 0;
    border: 2px solid #1e1e42;
    border-radius: 6px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 0 24px #00001888, inset 0 0 16px #000008;
    transition: box-shadow 0.6s ease;
}
/* ambient light overlay — soft radial glow at player position */
.dungeon-container::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at var(--px, 50%) var(--py, 50%), transparent 60px, rgba(0,0,8,0.55) 140px);
    pointer-events: none;
    border-radius: 4px;
}
.dungeon {
    display: grid;
    gap: 0;
}

/* --- Theme overrides --- */
.theme-cave .dungeon-container {
    box-shadow: 0 0 24px #00001888, inset 0 0 16px #000008;
}
.theme-dungeon .dungeon-container {
    box-shadow: 0 0 24px #18001888, inset 0 0 16px #000008;
}
.theme-crypt .dungeon-container {
    box-shadow: 0 0 24px #001808aa, inset 0 0 16px #000008;
}
.theme-abyss .dungeon-container {
    box-shadow: 0 0 24px #1a000088, inset 0 0 16px #000008;
}

/* --- Tile base --- */
.tile {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    cursor: pointer;
    border: 0.5px solid rgba(0,0,0,0.5);
    user-select: none;
    transition: background 0.1s;
}

/* --- Fog: never visited --- */
.tile-fog {
    background: #000005;
    color: transparent;
    border-color: #00000a;
}

/* --- Wall: currently visible --- */
.tile-wall {
    background: #0c0c1e;
    color: #2a2848;
    border-color: #0a0a18;
    font-size: 16px;
}

/* --- Wall: visited but out of sight --- */
.tile-wall-dark {
    background: #080813;
    color: #161428;
    border-color: #060610;
    font-size: 16px;
}

/* --- Floor: currently visible --- */
.tile-floor-lit {
    background: #141e38;
    color: #252d48;
    font-size: 12px;
}

/* --- Floor: visited, out of sight --- */
.tile-explored {
    background: #0a1020;
    color: #151c30;
    font-size: 12px;
}

/* --- Player tile --- */
.tile-player {
    background: #1a2744;
    font-size: 20px;
    border-color: #f4845f44;
    box-shadow: inset 0 0 8px #f4845f33;
    animation: player-pulse 2s ease-in-out infinite;
    z-index: 2;
}
@keyframes player-pulse {
    0%, 100% { box-shadow: inset 0 0 8px #f4845f33, 0 0 6px #f4845f22; }
    50%       { box-shadow: inset 0 0 14px #f4845f55, 0 0 10px #f4845f44; }
}

/* --- Enemy tile --- */
.tile-enemy {
    background: #1a0f1a;
    font-size: 18px;
    border-color: #e9456033;
    animation: enemy-flicker 3s ease-in-out infinite;
}
@keyframes enemy-flicker {
    0%, 100% { box-shadow: 0 0 4px #e9456033; }
    40%       { box-shadow: 0 0 8px #e9456066; }
    60%       { box-shadow: 0 0 3px #e9456022; }
}

/* --- Boss tile --- */
.tile-boss {
    background: #200808;
    font-size: 20px;
    border-color: #ff000055;
    animation: boss-pulse 1.5s ease-in-out infinite;
}
@keyframes boss-pulse {
    0%, 100% { box-shadow: 0 0 8px #ff000055, inset 0 0 6px #ff000033; }
    50%       { box-shadow: 0 0 16px #ff0000aa, inset 0 0 10px #ff000055; }
}

/* --- Item tile --- */
.tile-item {
    background: #16180a;
    font-size: 18px;
    border-color: #ffd70033;
    animation: item-shimmer 2.5s ease-in-out infinite;
}
@keyframes item-shimmer {
    0%, 100% { box-shadow: 0 0 4px #ffd70044; }
    50%       { box-shadow: 0 0 10px #ffd70088, inset 0 0 5px #ffd70022; }
}

/* --- Chest tile --- */
.tile-chest {
    background: #1a1400;
    font-size: 18px;
    border-color: #ffd70044;
    animation: item-shimmer 3s ease-in-out infinite;
}

/* --- Stairs tile --- */
.tile-stairs {
    background: #0a1a12;
    font-size: 18px;
    border-color: #00ff0033;
    animation: stairs-pulse 2s ease-in-out infinite;
}
@keyframes stairs-pulse {
    0%, 100% { box-shadow: 0 0 5px #00ff0033; }
    50%       { box-shadow: 0 0 12px #00ff0077, inset 0 0 6px #00ff0022; }
}

/* --- Controls --- */
.controls {
    display: grid;
    grid-template-columns: repeat(3, 64px);
    grid-template-rows: repeat(3, 48px);
    gap: 4px;
    margin: 8px 0;
}
.ctrl-btn {
    border: 2px solid #1e1e42;
    border-radius: 6px;
    background: #10101e;
    color: #ccc;
    font-family: 'Courier New', monospace;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.1s;
}
.ctrl-btn:active, .ctrl-btn:focus {
    background: #1a1a30;
    border-color: #f4845f;
    color: #f4845f;
    box-shadow: 0 0 8px #f4845f44;
    outline: none;
}
.ctrl-btn-flash {
    background: #252545 !important;
    border-color: #f4845f !important;
    color: #f4845f !important;
    box-shadow: 0 0 18px #f4845faa, inset 0 0 10px #f4845f44 !important;
    transition: none !important;
}
.ctrl-btn.action {
    background: #0c0c24;
    font-size: 12px;
}

.actions-row {
    display: flex;
    gap: 6px;
    margin: 4px 0;
}
.act-btn {
    padding: 10px 16px;
    border: 2px solid #1e1e42;
    border-radius: 6px;
    background: #10101e;
    color: #ccc;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.1s;
}
.act-btn:active, .act-btn:focus {
    background: #1a1a30;
    border-color: #f4845f;
    outline: none;
}
.act-btn.shield-active {
    border-color: #87ceeb;
    background: #0a1a28;
    box-shadow: 0 0 8px #87ceeb44;
    color: #87ceeb;
}

/* --- Game over overlay --- */
.game-over {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,8,0.92);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
}
.game-over.show { display: flex; pointer-events: all; }
.game-over h2 {
    color: #f4845f;
    font-size: 28px;
    margin-bottom: 10px;
    text-shadow: 0 0 16px #f4845f88;
}
.game-over p { color: #7f8c8d; margin: 4px 0; font-size: 14px; }
.game-over button {
    margin-top: 16px;
    padding: 12px 24px;
    border: 2px solid #f4845f;
    border-radius: 6px;
    background: #16213e;
    color: #f4845f;
    font-family: 'Courier New', monospace;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 0 0 12px #f4845f44;
}
.game-over button:hover {
    background: #1e2e55;
    box-shadow: 0 0 20px #f4845f88;
}

/* --- Continue screen overlay --- */
#continue-screen {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,8,1);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
}
#continue-screen.show { display: flex; pointer-events: all; }
#continue-screen h2 {
    color: #f4845f;
    font-size: 28px;
    margin-bottom: 10px;
    text-shadow: 0 0 16px #f4845f88;
}
#continue-screen p { color: #7f8c8d; margin: 4px 0; font-size: 14px; }
#continue-screen .btn-row {
    display: flex;
    gap: 12px;
    margin-top: 16px;
}
#continue-screen button {
    padding: 12px 24px;
    border: 2px solid #f4845f;
    border-radius: 6px;
    background: #16213e;
    color: #f4845f;
    font-family: 'Courier New', monospace;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 0 0 12px #f4845f44;
}
#continue-screen button:hover {
    background: #1e2e55;
    box-shadow: 0 0 20px #f4845f88;
}

.stats { font-size: 11px; color: #2a2a3a; margin: 5px 0; }

/* --- Game state summary (accessible to screen readers / ADB text scraping) --- */
#game-state {
    position: absolute;
    left: -9999px;
    width: 1px;
    height: 1px;
    overflow: hidden;
}
</style>
</head>
<body>

<div class="nav"><a href="index.html" aria-label="Back to Fox Arcade">← Arcade</a></div>
<h1>🦊 Fox Mystery Dungeon</h1>

<div class="hud">
    <span class="hp" id="hud-hp" aria-label="Health">HP: 20/20</span>
    <span class="floor" id="hud-floor" aria-label="Floor">F1</span>
    <span class="atk" id="hud-atk" aria-label="Attack power">ATK: 3</span>
    <span class="shield" id="hud-shield" aria-label="Shield charges">🛡 1</span>
    <span class="gold" id="hud-gold" aria-label="Gold collected">💰 0</span>
    <span class="keys" id="hud-keys" aria-label="Keys 0">🗝 0</span>
</div>

<div class="log" id="log" aria-live="polite">
    <div class="log-floor">A fox enters the dungeon...</div>
</div>

<div class="dungeon-container" id="dungeon-container">
    <div class="dungeon" id="dungeon"></div>
</div>

<div class="controls">
    <div></div>
    <button class="ctrl-btn" id="btn-up" aria-label="move up" onclick="move(0,-1)">↑</button>
    <div></div>
    <button class="ctrl-btn" id="btn-left" aria-label="move left" onclick="move(-1,0)">←</button>
    <button class="ctrl-btn" id="btn-wait" aria-label="wait" onclick="wait()">·</button>
    <button class="ctrl-btn" id="btn-right" aria-label="move right" onclick="move(1,0)">→</button>
    <div></div>
    <button class="ctrl-btn" id="btn-down" aria-label="move down" onclick="move(0,1)">↓</button>
    <div></div>
</div>

<div class="actions-row">
    <button class="act-btn" id="btn-shield" aria-label="Activate shield blocks next attack" onclick="activateShield()">🛡 Shield</button>
    <button class="act-btn" id="btn-attack" aria-label="Attack nearby enemy" onclick="attackNearby()">⚔ Attack</button>
    <button class="act-btn" id="btn-look" aria-label="Look around describe surroundings" onclick="lookAround()">👁 Look</button>
</div>

<div id="game-state" aria-live="polite" aria-atomic="true"></div>

<div class="stats" id="stats"></div>

<div class="game-over" id="game-over">
    <h2 id="go-title">Game Over</h2>
    <p id="go-floor">Reached: Floor 1</p>
    <p id="go-gold">Gold: 0</p>
    <p id="go-enemies">Enemies defeated: 0</p>
    <button aria-label="New Game — Play Again — Restart" onclick="newGame()">New Game</button>
</div>

<div id="continue-screen">
    <h2>🦊 Run in Progress</h2>
    <p id="cs-floor">Floor: 1</p>
    <p id="cs-hp">HP: 20/20</p>
    <p id="cs-gold">Gold: 0</p>
    <div class="btn-row">
        <button aria-label="Continue saved dungeon run" onclick="loadSave()">Continue Run</button>
        <button aria-label="Start new dungeon game discard save" onclick="newGame()">New Game</button>
    </div>
</div>

<script>
// --- Config ---
const MAP_W = 9;
const MAP_H = 9;
const TILE_SIZE = 36;

// Graduated enemy count: floor 1=1, 2-3=2, 4-6=3, 7-9=4, 10+=5
function getEnemyCount(f) {
    if (f === 1) return 1;
    if (f <= 3) return 2;
    if (f <= 6) return 3;
    if (f <= 9) return 4;
    return 5;
}

// --- Enemy data ---
const ENEMY_DATA = {
    'Rat':             { behavior: 'chase',   baseHp: 3,  baseAtk: 1 },
    'Rat Archer':      { behavior: 'ranged',  baseHp: 2,  baseAtk: 2 },
    'Bat':             { behavior: 'patrol',  baseHp: 4,  baseAtk: 1 },
    'Slime':           { behavior: 'chase',   baseHp: 6,  baseAtk: 1 },
    'Goblin':          { behavior: 'chase',   baseHp: 5,  baseAtk: 2 },
    'Goblin Scout':    { behavior: 'patrol',  baseHp: 4,  baseAtk: 2 },
    'Snake':           { behavior: 'chase',   baseHp: 5,  baseAtk: 2 },
    'Skeleton Archer': { behavior: 'ranged',  baseHp: 5,  baseAtk: 3 },
    'Spider':          { behavior: 'patrol',  baseHp: 6,  baseAtk: 2 },
    'Ghost':           { behavior: 'chase',   baseHp: 8,  baseAtk: 3 },
    'Wolf':            { behavior: 'chase',   baseHp: 10, baseAtk: 3 },
    'Lich':            { behavior: 'ranged',  baseHp: 12, baseAtk: 4 },
    'Demon':           { behavior: 'chase',   baseHp: 15, baseAtk: 4 },
    'Dragon':          { behavior: 'ranged',  baseHp: 25, baseAtk: 6 },
};

// Visual emoji/char maps (don't affect aria-labels)
const ENEMY_ICONS = {
    'Rat': '🐀', 'Rat Archer': '🐀', 'Bat': '🦇', 'Slime': '🟢',
    'Goblin': '👺', 'Goblin Scout': '👺', 'Snake': '🐍', 'Spider': '🕷',
    'Ghost': '👻', 'Wolf': '🐺', 'Demon': '👿', 'Dragon': '🐉',
    'Skeleton Archer': '💀', 'Lich': '🧙'
};
const ITEM_ICONS = {
    potion: '🧪', gold: '💰', sword: '⚔', shieldItem: '🛡', map: '🗺', key: '🗝',
    heartContainer: '💖'
};

// --- Floor themes ---
// Boss progression: Goblin (F3) → Wolf (F6) → Demon (F9) → Dragon (F12+)
function getTheme(f) {
    if (f <= 3) return {
        name: 'Cave',
        wallChars: ['▓','▒','█','▓','▒'],
        enemyPool: ['Rat','Rat Archer','Bat','Slime','Goblin'],
        bossName: 'Goblin',
        cssClass: 'theme-cave'
    };
    if (f <= 6) return {
        name: 'Dungeon',
        wallChars: ['█','▓','▓','░','█'],
        enemyPool: ['Goblin','Goblin Scout','Snake','Spider','Wolf'],
        bossName: 'Wolf',
        cssClass: 'theme-dungeon'
    };
    if (f <= 9) return {
        name: 'Crypt',
        wallChars: ['░','▓','▒','▓','░'],
        enemyPool: ['Ghost','Skeleton Archer','Spider','Lich','Snake'],
        bossName: 'Demon',
        cssClass: 'theme-crypt'
    };
    return {
        name: 'Abyss',
        wallChars: ['▓','█','▓','▒','▓'],
        enemyPool: ['Lich','Demon','Dragon','Ghost','Skeleton Archer'],
        bossName: 'Dragon',
        cssClass: 'theme-abyss'
    };
}

// --- State ---
let map = [];
let visible = [];   // ever seen
let inSight = [];   // currently lit (this turn)
let player = { x: 1, y: 1, hp: 20, maxHp: 20, atk: 3, shield: 1, shieldActive: false, gold: 0, keys: 0 };
let enemies = [];
let items = [];
let chests = [];
let stairsPos = { x: 0, y: 0 };
let floor = 1;
let enemiesDefeated = 0;
let turn = 0;
let gameActive = true;
let logs = [];

// --- Wall char: deterministic variety based on position + theme ---
function wallChar(x, y, theme) {
    const chars = theme ? theme.wallChars : ['▓','▓','█','▒','▓'];
    return chars[((x * 397) ^ (y * 443)) % chars.length];
}

// --- Map generation ---
function generateMap() {
    const theme = getTheme(floor);

    // Apply theme class to body
    document.body.className = theme.cssClass;

    map = [];
    for (let y = 0; y < MAP_H; y++) {
        map[y] = [];
        for (let x = 0; x < MAP_W; x++) {
            map[y][x] = '#';
        }
    }

    // Carve rooms
    const rooms = [];
    const numRooms = 3 + Math.floor(Math.random() * 2);
    for (let i = 0; i < numRooms; i++) {
        const rw = 3 + Math.floor(Math.random() * 2);
        const rh = 3 + Math.floor(Math.random() * 2);
        const rx = 1 + Math.floor(Math.random() * (MAP_W - rw - 2));
        const ry = 1 + Math.floor(Math.random() * (MAP_H - rh - 2));
        for (let y = ry; y < ry + rh && y < MAP_H - 1; y++) {
            for (let x = rx; x < rx + rw && x < MAP_W - 1; x++) {
                map[y][x] = '.';
            }
        }
        rooms.push({ cx: Math.floor(rx + rw / 2), cy: Math.floor(ry + rh / 2) });
    }

    // Connect rooms with corridors
    for (let i = 1; i < rooms.length; i++) {
        const a = rooms[i - 1];
        const b = rooms[i];
        let x = a.cx, y = a.cy;
        while (x !== b.cx) {
            if (x >= 0 && x < MAP_W && y >= 0 && y < MAP_H) map[y][x] = '.';
            x += x < b.cx ? 1 : -1;
        }
        while (y !== b.cy) {
            if (x >= 0 && x < MAP_W && y >= 0 && y < MAP_H) map[y][x] = '.';
            y += y < b.cy ? 1 : -1;
        }
    }

    // Reset visibility
    visible = [];
    inSight = [];
    for (let y = 0; y < MAP_H; y++) {
        visible[y] = [];
        inSight[y] = [];
        for (let x = 0; x < MAP_W; x++) {
            visible[y][x] = false;
            inSight[y][x] = false;
        }
    }

    // Place player in first room
    player.x = rooms[0].cx;
    player.y = rooms[0].cy;

    // Place stairs in last room
    const lastRoom = rooms[rooms.length - 1];
    stairsPos = { x: lastRoom.cx, y: lastRoom.cy };

    // Place enemies from theme pool
    const patrolDirs = [[1,0],[-1,0],[0,1],[0,-1]];
    enemies = [];
    for (let i = 0; i < getEnemyCount(floor); i++) {
        const pos = randomFloor();
        if (pos) {
            const name = theme.enemyPool[Math.floor(Math.random() * theme.enemyPool.length)];
            const data = ENEMY_DATA[name] || { behavior: 'chase', baseHp: 3, baseAtk: 1 };
            const enemy = {
                x: pos.x, y: pos.y,
                hp: data.baseHp + floor + Math.floor(Math.random() * 3),
                atk: data.baseAtk + Math.floor(floor / 3) + Math.floor(Math.random() * 2),
                name: name,
                behavior: data.behavior,
                isBoss: false,
            };
            if (data.behavior === 'patrol') {
                const d = patrolDirs[Math.floor(Math.random() * patrolDirs.length)];
                enemy.patrolDx = d[0];
                enemy.patrolDy = d[1];
            }
            enemies.push(enemy);
        }
    }

    // Boss every 3 floors
    if (floor % 3 === 0) {
        const bpos = randomFloor();
        if (bpos) {
            const bossName = theme.bossName;
            const bdata = ENEMY_DATA[bossName] || { behavior: 'chase', baseHp: 10, baseAtk: 2 };
            const boss = {
                x: bpos.x, y: bpos.y,
                hp: bdata.baseHp + floor * 2,
                atk: bdata.baseAtk + Math.floor(floor / 2),
                name: bossName,
                behavior: bdata.behavior,
                isBoss: true,
            };
            if (bdata.behavior === 'patrol') {
                const d = patrolDirs[Math.floor(Math.random() * patrolDirs.length)];
                boss.patrolDx = d[0];
                boss.patrolDy = d[1];
            }
            enemies.push(boss);
        }
    }

    // Place items — more on early floors, swords/potions weighted early
    items = [];
    const itemCount = floor <= 3 ? 3 : 2;
    const earlyPool = ['potion','potion','potion','sword','sword','shieldItem','map','key'];
    const latePool  = ['potion','potion','gold','sword','shieldItem','map','key','key'];
    for (let i = 0; i < itemCount; i++) {
        const pos = randomFloor();
        if (pos) {
            const pool = floor <= 3 ? earlyPool : latePool;
            const type = pool[Math.floor(Math.random() * pool.length)];
            items.push({ x: pos.x, y: pos.y, type });
        }
    }

    // Place chest (1 per floor)
    chests = [];
    const cpos = randomFloor();
    if (cpos) {
        chests.push({ x: cpos.x, y: cpos.y });
    }

    updateVisibility();
}

function randomFloor() {
    for (let tries = 0; tries < 50; tries++) {
        const x = 1 + Math.floor(Math.random() * (MAP_W - 2));
        const y = 1 + Math.floor(Math.random() * (MAP_H - 2));
        if (map[y][x] === '.' && !(x === player.x && y === player.y) &&
            !(x === stairsPos.x && y === stairsPos.y) &&
            !enemies.some(e => e.x === x && e.y === y) &&
            !items.some(i => i.x === x && i.y === y) &&
            !chests.some(c => c.x === x && c.y === y)) {
            return { x, y };
        }
    }
    return null;
}

function updateVisibility() {
    // Reset inSight for this turn
    for (let y = 0; y < MAP_H; y++) {
        for (let x = 0; x < MAP_W; x++) {
            inSight[y][x] = false;
        }
    }
    const radius = 3;
    for (let dy = -radius; dy <= radius; dy++) {
        for (let dx = -radius; dx <= radius; dx++) {
            const nx = player.x + dx;
            const ny = player.y + dy;
            if (nx >= 0 && nx < MAP_W && ny >= 0 && ny < MAP_H) {
                if (Math.abs(dx) + Math.abs(dy) <= radius + 1) {
                    visible[ny][nx] = true;
                    inSight[ny][nx] = true;
                }
            }
        }
    }
}

// --- Ambient light overlay position ---
function updateLightOverlay() {
    const container = document.getElementById('dungeon-container');
    const px = ((player.x + 0.5) / MAP_W) * 100;
    const py = ((player.y + 0.5) / MAP_H) * 100;
    container.style.setProperty('--px', px + '%');
    container.style.setProperty('--py', py + '%');
}

// --- Rendering ---
function render() {
    const theme = getTheme(floor);
    const dungeon = document.getElementById('dungeon');
    dungeon.innerHTML = '';
    dungeon.style.gridTemplateColumns = `repeat(${MAP_W}, ${TILE_SIZE}px)`;

    const ITEM_LABELS = {
        potion: 'Potion restores HP',
        gold: 'Gold coins',
        sword: 'Sword boosts ATK',
        shieldItem: 'Shield charge',
        map: 'Floor map reveals the whole level',
        key: 'Key opens locked chests',
        heartContainer: 'Heart Container increases max HP permanently'
    };

    for (let y = 0; y < MAP_H; y++) {
        for (let x = 0; x < MAP_W; x++) {
            const tile = document.createElement('div');
            tile.className = 'tile';

            if (!visible[y][x]) {
                // Never visited: pure fog
                tile.className = 'tile tile-fog';
                tile.textContent = ' ';
                tile.setAttribute('aria-label', 'Unknown');
            } else if (x === player.x && y === player.y) {
                tile.className = 'tile tile-player';
                tile.textContent = '🦊';
                tile.setAttribute('aria-label', 'Fox (you)');
            } else {
                const enemy = enemies.find(e => e.x === x && e.y === y);
                const item = items.find(i => i.x === x && i.y === y);
                const chest = chests.find(c => c.x === x && c.y === y);
                const lit = inSight[y][x];

                if (enemy && lit) {
                    tile.className = enemy.isBoss ? 'tile tile-boss' : 'tile tile-enemy';
                    tile.textContent = enemy.isBoss ? '☠' : (ENEMY_ICONS[enemy.name] || 'E');
                    const behaviorHint = enemy.behavior === 'ranged' ? ' ranged' : enemy.behavior === 'patrol' ? ' patrols' : '';
                    tile.setAttribute('aria-label', `${enemy.name} HP:${enemy.hp} ATK:${enemy.atk}${enemy.isBoss ? ' BOSS' : ''}${behaviorHint}`);
                } else if (x === stairsPos.x && y === stairsPos.y && lit) {
                    tile.className = 'tile tile-stairs';
                    tile.textContent = '▼';
                    tile.setAttribute('aria-label', 'Stairs to next floor');
                } else if (chest && lit) {
                    tile.className = 'tile tile-chest';
                    tile.textContent = '📦';
                    tile.setAttribute('aria-label', 'Locked chest requires key to open');
                } else if (item && lit) {
                    tile.className = 'tile tile-item';
                    tile.textContent = ITEM_ICONS[item.type] || item.type[0];
                    tile.setAttribute('aria-label', ITEM_LABELS[item.type] || item.type);
                } else if (map[y][x] === '#') {
                    // Wall — lit vs visited-but-dark
                    if (lit) {
                        tile.className = 'tile tile-wall';
                        tile.textContent = wallChar(x, y, theme);
                        tile.setAttribute('aria-label', 'Wall');
                    } else {
                        tile.className = 'tile tile-wall-dark';
                        tile.textContent = wallChar(x, y, theme);
                        tile.setAttribute('aria-label', 'Wall');
                    }
                } else {
                    // Floor — lit vs dim
                    if (lit) {
                        if (x === stairsPos.x && y === stairsPos.y) {
                            tile.className = 'tile tile-stairs';
                            tile.textContent = '▼';
                            tile.setAttribute('aria-label', 'Stairs to next floor');
                        } else if (chest) {
                            tile.className = 'tile tile-chest';
                            tile.textContent = '📦';
                            tile.setAttribute('aria-label', 'Locked chest requires key to open');
                        } else if (item) {
                            tile.className = 'tile tile-item';
                            tile.textContent = ITEM_ICONS[item.type] || item.type[0];
                            tile.setAttribute('aria-label', ITEM_LABELS[item.type] || item.type);
                        } else if (enemy) {
                            tile.className = enemy.isBoss ? 'tile tile-boss' : 'tile tile-enemy';
                            tile.textContent = enemy.isBoss ? '☠' : (ENEMY_ICONS[enemy.name] || 'E');
                            const behaviorHint = enemy.behavior === 'ranged' ? ' ranged' : enemy.behavior === 'patrol' ? ' patrols' : '';
                            tile.setAttribute('aria-label', `${enemy.name} HP:${enemy.hp} ATK:${enemy.atk}${enemy.isBoss ? ' BOSS' : ''}${behaviorHint}`);
                        } else {
                            tile.className = 'tile tile-floor-lit';
                            tile.textContent = '·';
                            tile.setAttribute('aria-label', 'Empty floor');
                        }
                    } else {
                        tile.className = 'tile tile-explored';
                        tile.textContent = '·';
                        tile.setAttribute('aria-label', 'Empty floor');
                    }
                }
            }

            dungeon.appendChild(tile);
        }
    }

    updateLightOverlay();

    // Update HUD
    document.getElementById('hud-hp').textContent = `HP: ${player.hp}/${player.maxHp}`;
    document.getElementById('hud-hp').setAttribute('aria-label', `Health ${player.hp} of ${player.maxHp}`);
    document.getElementById('hud-floor').textContent = `F${floor}`;
    document.getElementById('hud-floor').setAttribute('aria-label', `Floor ${floor}`);
    document.getElementById('hud-atk').textContent = `ATK: ${player.atk}`;
    document.getElementById('hud-atk').setAttribute('aria-label', `Attack power ${player.atk}`);
    document.getElementById('hud-shield').textContent = `🛡 ${player.shield}`;
    document.getElementById('hud-shield').setAttribute('aria-label', `Shield charges ${player.shield}`);
    document.getElementById('hud-gold').textContent = `💰 ${player.gold}`;
    document.getElementById('hud-gold').setAttribute('aria-label', `Gold ${player.gold}`);
    document.getElementById('hud-keys').textContent = `🗝 ${player.keys}`;
    document.getElementById('hud-keys').setAttribute('aria-label', `Keys ${player.keys}`);

    // Shield button state
    const shieldBtn = document.getElementById('btn-shield');
    if (player.shieldActive) {
        shieldBtn.classList.add('shield-active');
        shieldBtn.setAttribute('aria-label', 'Shield is ACTIVE will block next hit');
    } else {
        shieldBtn.classList.remove('shield-active');
        shieldBtn.setAttribute('aria-label', `Activate shield ${player.shield} charges left`);
    }

    // Update accessible game-state summary
    updateGameState();
}

// --- D-pad flash: brief highlight on the pressed direction button ---
function flashButton(id) {
    const btn = document.getElementById(id);
    if (!btn) return;
    btn.classList.add('ctrl-btn-flash');
    setTimeout(() => btn.classList.remove('ctrl-btn-flash'), 280);
}

// --- Actions ---
function move(dx, dy) {
    // Light up the corresponding d-pad button so ADB/visual feedback align
    if      (dx === 0  && dy === -1) flashButton('btn-up');
    else if (dx === 0  && dy ===  1) flashButton('btn-down');
    else if (dx === -1 && dy ===  0) flashButton('btn-left');
    else if (dx ===  1 && dy ===  0) flashButton('btn-right');
    if (!gameActive) return;
    const nx = player.x + dx;
    const ny = player.y + dy;

    if (nx < 0 || nx >= MAP_W || ny < 0 || ny >= MAP_H) return;
    if (map[ny][nx] === '#') {
        addLog("Bonk! That's a wall.", 'warn');
        return;
    }

    // Check for enemy
    const enemy = enemies.find(e => e.x === nx && e.y === ny);
    if (enemy) {
        combat(enemy);
        endTurn();
        return;
    }

    // Check for chest
    const chest = chests.find(c => c.x === nx && c.y === ny);
    if (chest) {
        if (player.keys > 0) {
            player.keys--;
            chests.splice(chests.indexOf(chest), 1);
            const rewards = ['potion','sword','shieldItem','gold','heartContainer'];
            const reward = rewards[Math.floor(Math.random() * rewards.length)];
            pickupItem({ type: reward });
            addLog('🗝 Chest opened!', 'pickup');
        } else {
            addLog('📦 Locked chest. Need a key.', 'warn');
        }
        endTurn();
        return;
    }

    // Move
    player.x = nx;
    player.y = ny;
    updateVisibility();

    // Check for items
    const itemIdx = items.findIndex(i => i.x === nx && i.y === ny);
    if (itemIdx >= 0) {
        pickupItem(items[itemIdx]);
        items.splice(itemIdx, 1);
    }

    // Check for stairs
    if (nx === stairsPos.x && ny === stairsPos.y) {
        addLog(`Descending to floor ${floor + 1}...`, 'floor');
        floor++;
        // Milestone max HP rewards at floors 5, 10, 15
        if ([5, 10, 15].includes(floor)) {
            player.maxHp += 5;
            player.hp = Math.min(player.maxHp, player.hp + 5);
            addLog(`💖 Milestone! Max HP → ${player.maxHp}!`, 'heal');
        }
        const restHeal = Math.max(3, Math.floor(player.maxHp * 0.3));
        player.hp = Math.min(player.maxHp, player.hp + restHeal);
        addLog(`Rested. +${restHeal} HP. (${player.hp}/${player.maxHp})`, 'heal');
        generateMap();
        render();
        const t = getTheme(floor);
        const flavorMsg = t.name === 'Crypt' ? 'The air smells of old bones.' : t.name === 'Abyss' ? 'Reality fractures here.' : 'The dungeon shifts.';
        addLog(`Floor ${floor} — ${t.name}. ${flavorMsg}`, 'floor');
        saveCurrent();
        return;
    }

    endTurn();
}

function combat(enemy) {
    const dmg = player.atk + Math.floor(Math.random() * 2);
    enemy.hp -= dmg;
    addLog(`Hit ${enemy.name} for ${dmg}! ${enemy.hp > 0 ? `(${enemy.hp} HP left)` : 'Defeated!'}`, 'hit');

    if (enemy.hp <= 0) {
        enemies.splice(enemies.indexOf(enemy), 1);
        enemiesDefeated++;
        const goldDrop = 1 + Math.floor(Math.random() * 3) + (enemy.isBoss ? 5 : 0);
        player.gold += goldDrop;
        addLog(`${enemy.name} dropped ${goldDrop} gold!`, 'pickup');
    }
}

function endTurn() {
    turn++;
    const theme = getTheme(floor);
    const patrolDirs = [[1,0],[-1,0],[0,1],[0,-1]];

    enemies.forEach(enemy => {
        if (enemy.behavior === 'ranged') {
            const dist = Math.abs(player.x - enemy.x) + Math.abs(player.y - enemy.y);
            if (dist <= 3 && inSight[enemy.y][enemy.x]) {
                // ranged attack
                if (player.shieldActive) {
                    player.shieldActive = false;
                    addLog(`Shield blocked ${enemy.name}'s shot!`, 'shield');
                } else {
                    const edmg = enemy.atk + Math.floor(Math.random() * 2);
                    player.hp -= edmg;
                    addLog(`${enemy.name} shoots you for ${edmg}!`, 'hit');
                }
            } else if (dist < 2) {
                // back away
                const bx = enemy.x + Math.sign(enemy.x - player.x);
                const by = enemy.y + Math.sign(enemy.y - player.y);
                if (bx >= 0 && bx < MAP_W && by >= 0 && by < MAP_H &&
                    map[by][bx] === '.' &&
                    !enemies.some(e => e !== enemy && e.x === bx && e.y === by)) {
                    enemy.x = bx; enemy.y = by;
                }
            }
            // else idles (out of range)
        } else if (enemy.behavior === 'patrol') {
            const dist = Math.abs(player.x - enemy.x) + Math.abs(player.y - enemy.y);
            if (dist <= 1) {
                // melee attack when adjacent
                if (player.shieldActive) {
                    player.shieldActive = false;
                    addLog(`Shield blocked ${enemy.name}'s attack!`, 'shield');
                } else {
                    const edmg = enemy.atk + Math.floor(Math.random() * 2);
                    player.hp -= edmg;
                    addLog(`${enemy.name} hits you for ${edmg}!`, 'hit');
                }
            } else {
                // patrol movement
                const nx = enemy.x + enemy.patrolDx;
                const ny = enemy.y + enemy.patrolDy;
                if (nx >= 0 && nx < MAP_W && ny >= 0 && ny < MAP_H &&
                    map[ny][nx] === '.' &&
                    !enemies.some(e => e !== enemy && e.x === nx && e.y === ny) &&
                    !(nx === player.x && ny === player.y)) {
                    enemy.x = nx; enemy.y = ny;
                } else {
                    // pick new direction
                    const valid = patrolDirs.filter(([ddx, ddy]) => {
                        const tx = enemy.x + ddx, ty = enemy.y + ddy;
                        return tx >= 0 && tx < MAP_W && ty >= 0 && ty < MAP_H &&
                            map[ty][tx] === '.' &&
                            !enemies.some(e => e !== enemy && e.x === tx && e.y === ty) &&
                            !(tx === player.x && ty === player.y);
                    });
                    if (valid.length) {
                        [enemy.patrolDx, enemy.patrolDy] = valid[Math.floor(Math.random() * valid.length)];
                    }
                }
            }
        } else {
            // chase (default behavior)
            const dx = Math.sign(player.x - enemy.x);
            const dy = Math.sign(player.y - enemy.y);

            if (Math.abs(player.x - enemy.x) + Math.abs(player.y - enemy.y) <= 1) {
                if (player.shieldActive) {
                    player.shieldActive = false;
                    addLog(`Shield blocked ${enemy.name}'s attack!`, 'shield');
                } else {
                    const edmg = enemy.atk + Math.floor(Math.random() * 2);
                    player.hp -= edmg;
                    addLog(`${enemy.name} hits you for ${edmg}!`, 'hit');
                }
            } else {
                const nx = enemy.x + dx;
                const ny = enemy.y + dy;
                if (nx >= 0 && nx < MAP_W && ny >= 0 && ny < MAP_H &&
                    map[ny][nx] === '.' &&
                    !enemies.some(e => e !== enemy && e.x === nx && e.y === ny) &&
                    !(nx === stairsPos.x && ny === stairsPos.y)) {
                    enemy.x = nx;
                    enemy.y = ny;
                }
            }
        }
    });

    if (player.hp <= 0) {
        player.hp = 0;
        gameActive = false;
        showGameOver(false);
        return;
    }

    saveCurrent();
    render();
}

function activateShield() {
    if (!gameActive) return;
    if (player.shield <= 0) {
        addLog("No shield charges left!", 'warn');
        return;
    }
    if (player.shieldActive) {
        addLog("Shield already active!", 'warn');
        return;
    }
    player.shield--;
    player.shieldActive = true;
    addLog("Shield activated! Next hit will be blocked.", 'shield');
    saveCurrent();
    render();
}

function attackNearby() {
    if (!gameActive) return;
    const adjacent = enemies.find(e =>
        Math.abs(e.x - player.x) + Math.abs(e.y - player.y) <= 1
    );
    if (adjacent) {
        combat(adjacent);
        endTurn();
    } else {
        addLog("No enemy nearby to attack.", 'warn');
    }
}

function lookAround() {
    if (!gameActive) return;
    const nearby = [];

    for (let dy = -3; dy <= 3; dy++) {
        for (let dx = -3; dx <= 3; dx++) {
            const nx = player.x + dx;
            const ny = player.y + dy;
            if (nx >= 0 && nx < MAP_W && ny >= 0 && ny < MAP_H && visible[ny][nx]) {
                const enemy = enemies.find(e => e.x === nx && e.y === ny);
                const item = items.find(i => i.x === nx && i.y === ny);
                const chest = chests.find(c => c.x === nx && c.y === ny);
                const dir = getDirection(dx, dy);
                if (enemy) nearby.push(`${enemy.name}(HP:${enemy.hp}) ${dir}`);
                if (item) nearby.push(`${item.type} ${dir}`);
                if (chest) nearby.push(`chest ${dir}`);
                if (nx === stairsPos.x && ny === stairsPos.y) nearby.push(`Stairs ${dir}`);
            }
        }
    }

    if (nearby.length > 0) {
        addLog("Nearby: " + nearby.join(", "), 'info');
    } else {
        addLog("Nothing interesting nearby.", 'info');
    }
    updateGameState();
}

function getDirection(dx, dy) {
    if (dx === 0 && dy === 0) return 'here';
    const h = dx > 0 ? 'east' : dx < 0 ? 'west' : '';
    const v = dy > 0 ? 'south' : dy < 0 ? 'north' : '';
    return v + (v && h ? '-' : '') + h;
}

// --- Compact relative offset like "2S-1E" ---
function getRelativeOffset(dx, dy) {
    if (dx === 0 && dy === 0) return 'here';
    let parts = [];
    if (dy < 0) parts.push(Math.abs(dy) + 'N');
    if (dy > 0) parts.push(dy + 'S');
    if (dx < 0) parts.push(Math.abs(dx) + 'W');
    if (dx > 0) parts.push(dx + 'E');
    return parts.join('-');
}

// --- Classify a tile for the game-state summary ---
function classifyTile(x, y) {
    if (x < 0 || x >= MAP_W || y < 0 || y >= MAP_H) return 'wall';
    if (map[y][x] === '#') return 'wall';
    const enemy = enemies.find(e => e.x === x && e.y === y);
    if (enemy) return enemy.isBoss ? 'boss' : 'enemy';
    if (x === stairsPos.x && y === stairsPos.y) return 'stairs';
    const chest = chests.find(c => c.x === x && c.y === y);
    if (chest) return 'chest';
    const item = items.find(i => i.x === x && i.y === y);
    if (item) return 'item';
    if (!visible[y][x]) return 'fog';
    return 'floor';
}

// --- Build game-state text for accessibility / ADB scraping ---
function updateGameState() {
    const el = document.getElementById('game-state');
    if (!el) return;

    const theme = getTheme(floor);
    const parts = [];

    // Line 1: Position + Stats + Floor
    parts.push(
        `Fox@(${player.x},${player.y}) HP:${player.hp}/${player.maxHp} ATK:${player.atk} Shield:${player.shield}${player.shieldActive ? '(ACTIVE)' : ''} Gold:${player.gold} Keys:${player.keys} | Floor ${floor} ${theme.name}`
    );

    // Line 2: Cardinal adjacent tiles
    const dirs = [
        { label: 'N', dx: 0, dy: -1 },
        { label: 'E', dx: 1, dy: 0 },
        { label: 'S', dx: 0, dy: 1 },
        { label: 'W', dx: -1, dy: 0 }
    ];

    const adjParts = [];
    const pathParts = [];

    for (const d of dirs) {
        const tx = player.x + d.dx;
        const ty = player.y + d.dy;
        const type = classifyTile(tx, ty);

        // Detailed adjacent description
        if (type === 'enemy' || type === 'boss') {
            const e = enemies.find(e => e.x === tx && e.y === ty);
            adjParts.push(`${d.label}:${e.name}(HP:${e.hp},ATK:${e.atk}${e.isBoss ? ',BOSS' : ''})`);
        } else if (type === 'item') {
            const it = items.find(i => i.x === tx && i.y === ty);
            adjParts.push(`${d.label}:${it.type}`);
        } else {
            adjParts.push(`${d.label}:${type}`);
        }

        // Path openness
        if (type === 'wall') {
            pathParts.push(`${d.label}:blocked`);
        } else if (type === 'enemy' || type === 'boss') {
            pathParts.push(`${d.label}:enemy`);
        } else {
            pathParts.push(`${d.label}:open`);
        }
    }

    parts.push('Adjacent: ' + adjParts.join(' '));
    parts.push('Paths: ' + pathParts.join(' '));

    // Line 4: Nearby notable things (enemies, items, chests, stairs) with relative offsets
    const nearby = [];
    for (let dy = -4; dy <= 4; dy++) {
        for (let dx = -4; dx <= 4; dx++) {
            if (dx === 0 && dy === 0) continue;
            const nx = player.x + dx;
            const ny = player.y + dy;
            if (nx < 0 || nx >= MAP_W || ny < 0 || ny >= MAP_H) continue;
            if (!visible[ny][nx]) continue;

            const offset = getRelativeOffset(dx, dy);
            const enemy = enemies.find(e => e.x === nx && e.y === ny);
            if (enemy) {
                nearby.push(`${enemy.name}(HP:${enemy.hp},ATK:${enemy.atk}${enemy.isBoss ? ',BOSS' : ''}) ${offset}`);
            }
            const item = items.find(i => i.x === nx && i.y === ny);
            if (item) {
                nearby.push(`${item.type} ${offset}`);
            }
            const chest = chests.find(c => c.x === nx && c.y === ny);
            if (chest) {
                nearby.push(`chest ${offset}`);
            }
            if (nx === stairsPos.x && ny === stairsPos.y) {
                nearby.push(`Stairs ${offset}`);
            }
        }
    }

    if (nearby.length > 0) {
        parts.push('Nearby: ' + nearby.join(', '));
    } else {
        parts.push('Nearby: nothing visible');
    }

    // Line 5: Last 2 log messages
    if (logs.length > 0) {
        const recentLogs = logs.slice(0, 2).map(l => l.msg);
        parts.push('Log: ' + recentLogs.join(' | '));
    }

    // Line 6: Game status
    if (!gameActive) {
        parts.push('STATUS: GAME OVER');
    }

    el.textContent = parts.join('\n');
}

function pickupItem(item) {
    switch (item.type) {
        case 'potion': {
            const heal = 5 + Math.floor(floor / 2);
            player.hp = Math.min(player.maxHp, player.hp + heal);
            addLog(`🧪 Potion! +${heal} HP. (${player.hp}/${player.maxHp})`, 'heal');
            break;
        }
        case 'gold': {
            const amt = 2 + Math.floor(Math.random() * 4);
            player.gold += amt;
            addLog(`💰 Found ${amt} gold!`, 'pickup');
            break;
        }
        case 'sword':
            player.atk += 1;
            addLog(`⚔ Sword! ATK → ${player.atk}!`, 'pickup');
            break;
        case 'shieldItem':
            player.shield += 1;
            addLog(`🛡 Shield charge! Now have ${player.shield}.`, 'pickup');
            break;
        case 'map':
            // Reveal all floor tiles
            for (let y = 0; y < MAP_H; y++) {
                for (let x = 0; x < MAP_W; x++) {
                    if (map[y][x] === '.') {
                        visible[y][x] = true;
                    }
                }
            }
            addLog('🗺 Map! The whole floor is revealed.', 'pickup');
            break;
        case 'key':
            player.keys += 1;
            addLog(`🗝 Key! You have ${player.keys} key(s).`, 'pickup');
            break;
        case 'heartContainer': {
            const hpGain = 5;
            player.maxHp += hpGain;
            player.hp = Math.min(player.maxHp, player.hp + hpGain);
            addLog(`💖 Heart Container! Max HP → ${player.maxHp}!`, 'heal');
            break;
        }
    }
}

function wait() {
    if (!gameActive) return;
    flashButton('btn-wait');
    addLog("You wait...", 'info');
    endTurn();
}

function addLog(msg, type) {
    logs.unshift({ msg, type: type || 'info' });
    if (logs.length > 10) logs.pop();
    const logEl = document.getElementById('log');
    logEl.innerHTML = logs.slice(0, 2).map(l => `<div class="log-${l.type}">${l.msg}</div>`).join('');
}

function showGameOver(won) {
    gameActive = false;
    localStorage.removeItem('fox-dungeon-save');
    updateHighScore();
    document.getElementById('game-over').classList.add('show');
    document.getElementById('go-title').textContent = won ? '🏆 Victory!' : 'The fox falls...';
    document.getElementById('go-floor').textContent = `Reached: Floor ${floor}`;
    document.getElementById('go-gold').textContent = `Gold: ${player.gold}`;
    document.getElementById('go-enemies').textContent = `Enemies defeated: ${enemiesDefeated}`;
    // Set game-state to GAME OVER so heartbeat knows to tap New Game
    document.getElementById('game-state').textContent =
        `GAME OVER: ${won ? 'Victory!' : 'The fox falls...'} Reached Floor ${floor}, Gold ${player.gold}, ${enemiesDefeated} enemies defeated. Tap "New Game" to play again.`;
}

function updateHighScore() {
    const stats = JSON.parse(localStorage.getItem('fox-arcade-stats') || '{}');
    if (!stats.dungeon) stats.dungeon = { played: 0, bestFloor: 0, totalGold: 0, totalEnemies: 0 };
    stats.dungeon.played++;
    stats.dungeon.totalGold += player.gold;
    stats.dungeon.totalEnemies += enemiesDefeated;
    if (floor > stats.dungeon.bestFloor) stats.dungeon.bestFloor = floor;
    localStorage.setItem('fox-arcade-stats', JSON.stringify(stats));
}

function newGame() {
    localStorage.removeItem('fox-dungeon-save');
    document.getElementById('game-over').classList.remove('show');
    document.getElementById('continue-screen').classList.remove('show');
    document.getElementById('dungeon-container').style.display = '';
    player = { x: 1, y: 1, hp: 20, maxHp: 20, atk: 3, shield: 1, shieldActive: false, gold: 0, keys: 0 };
    enemies = [];
    items = [];
    chests = [];
    floor = 1;
    enemiesDefeated = 0;
    turn = 0;
    gameActive = true;
    logs = [];
    addLog("A fox enters the dungeon...", 'floor');
    generateMap();
    render();
}

// --- Save / Load ---
function saveCurrent() {
    if (!gameActive) return;
    try {
        const save = {
            map, visible, inSight,
            player, enemies, items, chests,
            stairsPos, floor, enemiesDefeated,
            turn, gameActive, logs,
            timestamp: Date.now()
        };
        localStorage.setItem('fox-dungeon-save', JSON.stringify(save));
    } catch (e) {
        // Storage full or unavailable — silently fail
    }
}

function loadSave() {
    try {
        const raw = localStorage.getItem('fox-dungeon-save');
        if (!raw) { newGame(); return; }
        const save = JSON.parse(raw);

        map           = save.map;
        visible       = save.visible;
        inSight       = save.inSight;
        player        = save.player;
        enemies       = save.enemies;
        items         = save.items;
        chests        = save.chests || [];
        stairsPos     = save.stairsPos;
        floor         = save.floor;
        enemiesDefeated = save.enemiesDefeated;
        turn          = save.turn;
        gameActive    = save.gameActive;
        logs          = save.logs || [];

        // Restore missing fields for older saves
        if (player.keys === undefined) player.keys = 0;
        enemies.forEach(e => {
            if (!e.behavior) {
                const data = ENEMY_DATA[e.name];
                e.behavior = data ? data.behavior : 'chase';
            }
        });

        // Apply theme
        const theme = getTheme(floor);
        document.body.className = theme.cssClass;

        document.getElementById('continue-screen').classList.remove('show');
        document.getElementById('dungeon-container').style.display = '';
        render();
        // Re-render log
        const logEl = document.getElementById('log');
        logEl.innerHTML = logs.slice(0, 2).map(l => `<div class="log-${l.type}">${l.msg}</div>`).join('');
        addLog("Run resumed. Welcome back, fox.", 'floor');
    } catch (e) {
        // Corrupted save — start fresh
        localStorage.removeItem('fox-dungeon-save');
        newGame();
    }
}

// --- Keyboard controls ---
document.addEventListener('keydown', (e) => {
    switch (e.key) {
        case 'ArrowUp':    case 'w': move(0, -1); break;
        case 'ArrowDown':  case 's': move(0, 1);  break;
        case 'ArrowLeft':  case 'a': move(-1, 0); break;
        case 'ArrowRight': case 'd': move(1, 0);  break;
        case ' ': wait(); break;
        case 'q': activateShield(); break;
        case 'e': attackNearby(); break;
        case 'l': lookAround(); break;
    }
});

// --- Init ---
(function init() {
    try {
        const raw = localStorage.getItem('fox-dungeon-save');
        if (raw) {
            const save = JSON.parse(raw);
            if (save && save.gameActive === true) {
                // Show continue screen
                document.getElementById('cs-floor').textContent = `Floor: ${save.floor}`;
                document.getElementById('cs-hp').textContent =
                    `HP: ${save.player.hp}/${save.player.maxHp}`;
                document.getElementById('cs-gold').textContent =
                    `Gold: ${save.player.gold}`;
                document.getElementById('continue-screen').classList.add('show');
                // Hide dungeon grid so ghost tiles don't appear in UI tree
                document.getElementById('dungeon-container').style.display = 'none';
                // Set game-state to MENU so heartbeat knows to tap a button
                document.getElementById('game-state').textContent =
                    `MENU: Tap "Continue Run" to resume Floor ${save.floor} run (HP:${save.player.hp}/${save.player.maxHp}, Gold:${save.player.gold}) or tap "New Game" to start fresh.`;
                return;
            }
        }
    } catch (e) {
        localStorage.removeItem('fox-dungeon-save');
    }
    // No valid save — fresh start
    generateMap();
    render();
    addLog("A fox enters the dungeon...", 'floor');
})();

// Show stats
const _stats = JSON.parse(localStorage.getItem('fox-arcade-stats') || '{}');
const _d = _stats.dungeon || {};
document.getElementById('stats').textContent =
    `Best: F${_d.bestFloor || 0} | Played: ${_d.played || 0} | Enemies: ${_d.totalEnemies || 0}`;
</script>
